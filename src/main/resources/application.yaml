server:
  port: 8081
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: Nudes Protector
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nudes_protector}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: ${LIQUIBASE_URL:jdbc:postgresql://localhost:5432/nudes_protector}
    user: ${LIQUIBASE_USERNAME:${DB_USERNAME:postgres}}
    password: ${LIQUIBASE_PASSWORD:${DB_PASSWORD:postgres}}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - openid
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-github-client-secret}
            scope:
              - read:user
              - user:email
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  gallery:
    minio:
      endpoint: ${APP_GALLERY_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${APP_GALLERY_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${APP_GALLERY_MINIO_SECRET_KEY:minioadmin}
      bucket: ${APP_GALLERY_MINIO_BUCKET:nudes-gallery}
      max-items: ${APP_GALLERY_MINIO_MAX_ITEMS:10}
  security:
    login:
      max-attempts: 5
      lock-duration: PT15M
    mfa:
      otp-ttl: PT5M
      max-attempts: 3
    ott:
      ttl: PT10M
    remember-me:
      key: ${APP_SECURITY_REMEMBER_ME_KEY:change-me-remember-me-key}
      token-validity-seconds: ${APP_SECURITY_REMEMBER_ME_TOKEN_VALIDITY_SECONDS:2592000}
      cookie-name: ${APP_SECURITY_REMEMBER_ME_COOKIE_NAME:remember-me}
      secure-cookie: ${APP_SECURITY_REMEMBER_ME_SECURE_COOKIE:false}
    passkeys:
      rp-id: ${APP_SECURITY_PASSKEYS_RP_ID:localhost}
      rp-name: ${APP_SECURITY_PASSKEYS_RP_NAME:Nudes Protector}
      allowed-origins: ${APP_SECURITY_PASSKEYS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    verification:
      ttl: PT15M
    from: ${APP_MAIL_FROM:noreply@nudesprotector.local}
