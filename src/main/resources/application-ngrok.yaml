server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        same-site: lax

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:https://lightfootedly-unelectrical-danna.ngrok-free.dev}
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:*}
    remember-me:
      secure-cookie: true
    passkeys:
      rp-id: ${APP_SECURITY_PASSKEYS_RP_ID:lightfootedly-unelectrical-danna.ngrok-free.dev}
      allowed-origins: ${APP_SECURITY_PASSKEYS_ALLOWED_ORIGINS:${app.frontend.base-url}}
