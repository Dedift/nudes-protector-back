spring:
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: ${APP_GOOGLE_REDIRECT_URI:${app.frontend.base-url}/login/oauth2/code/google}
          github:
            redirect-uri: ${APP_GITHUB_REDIRECT_URI:${app.frontend.base-url}/login/oauth2/code/github}

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        same-site: lax

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:https://lightfootedly-unelectrical-danna.ngrok-free.dev}
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:*}
    remember-me:
      secure-cookie: true
    passkeys:
      rp-id: ${APP_SECURITY_PASSKEYS_RP_ID:lightfootedly-unelectrical-danna.ngrok-free.dev}
      allowed-origins: ${APP_SECURITY_PASSKEYS_ALLOWED_ORIGINS:${app.frontend.base-url}}
