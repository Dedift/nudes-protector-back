databaseChangeLog:
  - changeSet:
      id: 007-create-user-oauth2-accounts
      author: stanislau.zhvanski
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: user_oauth2_accounts
      changes:
        - createTable:
            tableName: user_oauth2_accounts
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: provider
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: provider_user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_oauth2_accounts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_oauth2_accounts_user_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: user_oauth2_accounts
            columnNames: provider, provider_user_id
            constraintName: uk_user_oauth2_accounts_provider_user
        - addUniqueConstraint:
            tableName: user_oauth2_accounts
            columnNames: user_id, provider
            constraintName: uk_user_oauth2_accounts_user_provider
        - createIndex:
            tableName: user_oauth2_accounts
            indexName: idx_user_oauth2_accounts_user_id
            columns:
              - column:
                  name: user_id
