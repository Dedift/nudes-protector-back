databaseChangeLog:
  - changeSet:
      id: 003-create-user-entities
      author: stanislau.zhvanski
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: user_entities
      changes:
        - createTable:
            tableName: user_entities
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: display_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: 004-create-user-credentials
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: user_credentials
      changes:
        - createTable:
            tableName: user_credentials
            columns:
              - column:
                  name: credential_id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_entity_user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: public_key
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: signature_count
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: uv_initialized
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: backup_eligible
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: authenticator_transports
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: public_key_credential_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: backup_state
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: attestation_object
                  type: BYTEA
              - column:
                  name: attestation_client_data_json
                  type: BYTEA
              - column:
                  name: created
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: last_used
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: user_credentials
            baseColumnNames: user_entity_user_id
            referencedTableName: user_entities
            referencedColumnNames: id
            constraintName: fk_user_credentials_user_entity_user_id
            onDelete: CASCADE
        - createIndex:
            tableName: user_credentials
            indexName: idx_user_credentials_user_entity_user_id
            columns:
              - column:
                  name: user_entity_user_id
