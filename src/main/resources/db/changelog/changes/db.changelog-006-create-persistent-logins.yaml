databaseChangeLog:
  - changeSet:
      id: 006-create-persistent-logins
      author: stanislau.zhvanski
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: persistent_logins
      changes:
        - createTable:
            tableName: persistent_logins
            columns:
              - column:
                  name: username
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: series
                  type: VARCHAR(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: last_used
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: persistent_logins
            indexName: idx_persistent_logins_username
            columns:
              - column:
                  name: username
