databaseChangeLog:
  - changeSet:
      id: 002-create-email-verification-codes
      author: stanislau.zhvanski
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: email_verification_codes
      changes:
        - createTable:
            tableName: email_verification_codes
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(6)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: email_verification_codes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_email_verification_codes_user_id
            onDelete: CASCADE
        - createIndex:
            tableName: email_verification_codes
            indexName: idx_email_verification_codes_user_id
            columns:
              - column:
                  name: user_id
