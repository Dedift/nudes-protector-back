databaseChangeLog:
  - changeSet:
      id: 005-create-one-time-tokens
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: one_time_tokens
      changes:
        - createTable:
            tableName: one_time_tokens
            columns:
              - column:
                  name: token_value
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: one_time_tokens
            indexName: idx_one_time_tokens_username
            columns:
              - column:
                  name: username
