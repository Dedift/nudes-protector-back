services:
  postgres:
    image: postgres:17
    container_name: nudes-protector-postgres
    environment:
      POSTGRES_DB: nudes_protector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: nudes-protector-redis
    ports:
      - "6379:6379"
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: nudes-protector-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: nudes-protector-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.6
    container_name: nudes-protector-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
