services:
  postgres:
    image: postgres:17
    container_name: nudes-protector-postgres
    environment:
      POSTGRES_DB: nudes_protector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: nudes-protector-redis
    ports:
      - "6379:6379"
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: nudes-protector-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
